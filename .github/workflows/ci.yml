name: Java CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: paymentdb
          POSTGRES_USER: paymentuser
          POSTGRES_PASSWORD: paymentpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U paymentuser -d paymentdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Grant permission to Maven Wrapper
        run: chmod +x mvnw

      - name: Run tests and build
        run: ./mvnw clean verify